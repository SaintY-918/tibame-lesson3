name: vms

services:
  db:
    image: postgres:16
    container_name: vms-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vms
      POSTGRES_USER: vms
      POSTGRES_PASSWORD: vms
    ports:
      - "5432:5432"
    volumes:
      - vms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vms -d vms"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - vms-net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: vms-pgadmin
    restart: unless-stopped
    user: root
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - vms_pgadmin:/var/lib/pgadmin
      - ./infra/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./infra/pgadmin/pgpass:/pgpass:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        cp /pgpass /tmp/pgpass &&
        chmod 600 /tmp/pgpass &&
        chown 5050:5050 /tmp/pgpass &&
        PGPASSFILE=/tmp/pgpass exec /entrypoint.sh
    networks:
      - vms-net

volumes:
  vms_pgdata:
  vms_pgadmin:

networks:
  vms-net:
    name: vms-net
