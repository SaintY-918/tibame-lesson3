# production 前端：serve SPA 靜態檔 + 反向代理 /api 到內部 api 服務。
# 對外只開這個 server（見 docker-compose-prod.yml），api/db 不開對外 port。
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API 反向代理：與前端同源，瀏覽器不需 CORS，httpOnly cookie 直接生效
    location /api/ {
        proxy_pass http://api:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # vite build 產物帶 content hash，可放心長快取
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback：其餘路徑交給 React Router
    location / {
        try_files $uri $uri/ /index.html;
    }
}
