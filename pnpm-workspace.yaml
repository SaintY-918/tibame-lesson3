packages:
  - apps/*
  - packages/*

# 內部套件用 `"@vms/shared": "*"` 引用（與 npm workspaces 共用同一套 package.json），
# pnpm 預設只連結 workspace: 協定，需開啟此設定才會把 `*` 解析成 workspace 內的套件
linkWorkspacePackages: true

# pnpm v11 需要明確允許相依套件的 postinstall/build script
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  '@tailwindcss/oxide': true
  bcrypt: true
  esbuild: true
  prisma: true
  unrs-resolver: true
